[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Nightly Firebase → Google Drive backup.
# Runs at 07:00 UTC = 3:00 AM ET (EST) / 2:00 AM ET (EDT).
# Can also be triggered manually: GET /api/backup-nightly
[functions."backup-nightly"]
  schedule = "0 7 * * *"
